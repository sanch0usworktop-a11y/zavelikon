*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;

body{
background:black;
color:white;
overflow-x:hidden;

/* animated gradient background */

body::before{
content:'';
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%,#ff00ff22,transparent),
radial-gradient(circle at 70% 60%,#8a2be233,transparent),
radial-gradient(circle at 50% 80%,#00ffff22,transparent);
animation:bgMove 12s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-200px,-150px)}
100%{transform:translate(0,0)}
}

/* NAVBAR */

.nav{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
padding:18px;
display:flex;
justify-content:center;
gap:40px;
z-index:10;
}

.nav a{
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.nav a:hover{
color:#ff00ff;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.logo{
font-size:90px;
font-weight:900;
background:linear-gradient(90deg,#ff00ff,#8a2be2,#00ffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 20px #ff00ff}
to{text-shadow:0 0 40px #00ffff}
}

.hero p{
margin-top:15px;
font-size:20px;
opacity:.8;
}

.main-btn{
margin-top:40px;
padding:18px 50px;
font-size:20px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff00ff,#8a2be2);
color:white;
cursor:pointer;
transition:.4s;
}

.main-btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #ff00ff;
}

/* PROGRAMS */

.section{
padding:120px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:60px;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
width:280px;
border-radius:30px;
backdrop-filter:blur(20px);
transition:.5s;
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
width:120%;
height:120%;
background:linear-gradient(120deg,#ff00ff44,#00ffff44);
top:-20%;
left:-20%;
opacity:0;
transition:.5s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-15px) scale(1.05);
box-shadow:0 0 40px #ff00ff55;
}

.price{
font-size:46px;
margin:20px 0;
color:#ff00ff;
}

.card button{
padding:14px 30px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff00ff,#8a2be2);
color:white;
cursor:pointer;
}

/* GYM */

.gym{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:50px;
}

.gym img{
width:300px;
height:200px;
object-fit:cover;
border-radius:20px;
transition:.4s;
}

.gym img:hover{
transform:scale(1.1);
box-shadow:0 0 25px #ff00ff;
}

/* TELEGRAM FLOAT */

.tg{
position:fixed;
bottom:30px;
right:30px;
background:linear-gradient(90deg,#ff00ff,#8a2be2);
padding:18px 22px;
border-radius:50%;
font-size:22px;
box-shadow:0 0 25px #ff00ff;
text-decoration:none;
color:white;
}

/* FOOTER */

.footer{
padding:60px;
text-align:center;
opacity:.5;
}

</style>
</head>
