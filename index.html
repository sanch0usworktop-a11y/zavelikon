<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zavelikon</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

body{background:#0b0b0b;color:white;overflow-x:hidden;}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:100;
}

.user{
color:#ff6a00;
}

/* BURGER */

.burger{
width:30px;
height:20px;
cursor:pointer;
position:relative;
}

.burger span{
position:absolute;
width:100%;
height:3px;
background:white;
transition:.3s;
}

.burger span:nth-child(1){top:0;}
.burger span:nth-child(2){top:8px;}
.burger span:nth-child(3){bottom:0;}

.burger.active span:nth-child(1){
transform:rotate(45deg);
top:8px;
}

.burger.active span:nth-child(2){
opacity:0;
}

.burger.active span:nth-child(3){
transform:rotate(-45deg);
bottom:9px;
}

/* FULLSCREEN MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;
opacity:0;
pointer-events:none;
transition:.4s;
z-index:90;
}

.menu.active{
opacity:1;
pointer-events:all;
}

.menu a{
font-size:40px;
text-decoration:none;
color:white;
transition:.3s;
}

.menu a:hover{
color:#ff6a00;
transform:scale(1.1);
}

/* HERO */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
}

.cta{
margin-top:30px;
padding:15px 40px;
background:#ff6a00;
border:none;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
background:#111;
padding:40px;
border-radius:20px;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:200;
width:300px;
}

.modal.active{
opacity:1;
pointer-events:all;
transform:translate(-50%,-50%) scale(1);
}

.modal input{
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:10px;
}

.modal button{
width:100%;
padding:10px;
background:#ff6a00;
border:none;
margin-top:10px;
cursor:pointer;
}

/* OVERLAY */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:150;
}

.overlay.active{
opacity:1;
pointer-events:all;
}

</style>
</head>

<body>

<div class="nav">
<div>Zaveli<span style="color:#ff6a00">kon</span></div>

<div class="user" id="user">Гость</div>

<div class="burger" id="burger" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>
</div>

<div class="menu" id="menu">
<a href="#">Главная</a>
<a href="#">Программы</a>
<a href="#" onclick="openAuth()">Войти</a>
</div>

<div class="hero">
<h1 id="welcome">Создай тело мечты</h1>
<button class="cta" onclick="openAuth()">Начать</button>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- AUTH -->

<div class="modal" id="authModal">
<h3>Вход / Регистрация</h3>

<input id="login" placeholder="Логин">
<input id="pass" type="password" placeholder="Пароль">

<button onclick="register()">Регистрация</button>
<button onclick="loginUser()">Войти</button>
</div>

<script>

const menu = document.getElementById("menu");
const burger = document.getElementById("burger");
const overlay = document.getElementById("overlay");
const modal = document.getElementById("authModal");

/* MENU */

function toggleMenu(){
menu.classList.toggle("active");
burger.classList.toggle("active");
}

function closeAll(){
menu.classList.remove("active");
burger.classList.remove("active");
modal.classList.remove("active");
overlay.classList.remove("active");
}

/* AUTH */

function openAuth(){
modal.classList.add("active");
overlay.classList.add("active");
}

/* REGISTER */

function register(){
let login = document.getElementById("login").value;
let pass = document.getElementById("pass").value;

localStorage.setItem("user", login);
localStorage.setItem("pass", pass);

alert("Готово");
}

/* LOGIN */

function loginUser(){
let login = document.getElementById("login").value;
let pass = document.getElementById("pass").value;

if(localStorage.getItem("user") === login && localStorage.getItem("pass") === pass){
document.getElementById("welcome").innerText = "Привет, " + login;
document.getElementById("user").innerText = login;
closeAll();
}else{
alert("Ошибка");
}
}

/* AUTO */

window.onload = ()=>{
let user = localStorage.getItem("user");
if(user){
document.getElementById("user").innerText = user;
document.getElementById("welcome").innerText = "Привет, " + user;
}
}

</script><script>

// если не залогинен → кидает обратно
if(localStorage.getItem("logged") !== "true"){
window.location.href = "auth.html";
}

// имя пользователя
window.onload = ()=>{
let user = localStorage.getItem("user");
if(user){
document.getElementById("welcome").innerText = "Привет, " + user;
}
}

// logout
function logout(){
localStorage.removeItem("logged");
window.location.href = "auth.html";
}

</script>

</body>
</html>
