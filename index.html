<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* VIDEO BG */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
opacity:.25;
}

/* GRADIENT OVERLAY */

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(120deg,#000,#0a001a,#000);
z-index:-1;
}

/* NAV */

.nav{
position:fixed;

width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:20px;
backdrop-filter:blur(12px);
background:rgba(0,0,0,0.4);
z-index:5;
}

.nav a{
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.nav a:hover{
color:#ff00ff;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
font-size:110px;
font-weight:900;
background:linear-gradient(90deg,#ff00ff,#00ffff,#8a2be2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:pulse 3s infinite alternate;
}

@keyframes pulse{
from{text-shadow:0 0 20px #ff00ff}
to{text-shadow:0 0 60px #00ffff}
}

.main-btn{
margin-top:40px;
padding:20px 60px;
font-size:22px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff00ff,#8a2be2);

color:white;
transition:.4s;
}

.main-btn:hover{
transform:scale(1.15);
box-shadow:0 0 40px #ff00ff;
}

/* SECTION */

.section{
padding:120px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:60px;
}

.card{
background:rgba(255,255,255,0.06);
padding:45px;
width:280px;
border-radius:30px;
backdrop-filter:blur(25px);
transition:.6s;
opacity:0;
transform:translateY(60px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:scale(1.1);
box-shadow:0 0 50px #ff00ff;
}

.price{
font-size:50px;
margin:20px 0;
color:#ff00ff;
}

.card button{
padding:14px 30px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff00ff,#8a2be2);
color:white;
cursor:pointer;
}

/* COUNTER */

.counter{
font-size:70px;
font-weight:900;
color:#ff00ff;
margin-top:30px;
}

/* GYM */

.gym{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:60px;
}

.gym img{
width:320px;
height:200px;
object-fit:cover;
border-radius:20px;
transition:.5s;
}

.gym img:hover{
transform:scale(1.15);
box-shadow:0 0 40px #ff00ff;
}

/* FLOAT TG */

.tg{
position:fixed;
bottom:30px;
right:30px;
background:linear-gradient(90deg,#ff00ff,#8a2be2);
padding:20px;
border-radius:50%;
font-size:22px;
box-shadow:0 0 40px #ff00ff;
text-decoration:none;
color:white;
}

/* FOOTER */

.footer{
padding:60px;
opacity:.4;
text-align:center;
}

</style>
</head>

<script>

/* scroll animation */

const cards=document.querySelectorAll('.card')

window.addEventListener('scroll',()=>{
cards.forEach(card=>{
const pos=card.getBoundingClientRect().top
if(pos<window.innerHeight-100){
card.classList.add('show')
}
})
})

/* counter */

let count=0
let target=347
let interval=setInterval(()=>{
count++
document.getElementById('counter').innerText=count
if(count>=target) clearInterval(interval)
},10)

</script>
