<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zavelikon</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

body{background:#0b0b0b;color:white;overflow-x:hidden;}

/* NAV */

.nav{
display:flex;justify-content:space-between;
padding:25px 8%;
position:fixed;width:100%;top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

.logo-nav span{color:#ff6a00;}

/* BURGER */

.burger{
width:30px;cursor:pointer;
display:flex;flex-direction:column;gap:6px;
}

.burger span{
height:3px;background:white;border-radius:2px;
}

/* MENU */

.menu{
position:fixed;top:0;right:-100%;
width:300px;height:100vh;
background:#111;padding:80px 30px;
transition:.4s;z-index:200;
}

.menu.active{right:0;}

.close{
position:absolute;top:20px;right:20px;
font-size:25px;cursor:pointer;
}

.menu a{
display:block;margin:20px 0;
color:white;text-decoration:none;
}

/* OVERLAY */

.overlay{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
opacity:0;pointer-events:none;
transition:.3s;z-index:150;
}

.overlay.active{
opacity:1;pointer-events:all;
}

/* HERO */

.hero{padding:150px 8%;}

/* AUTH MODAL */

.modal{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.8);
background:#141414;
padding:30px;
border-radius:15px;
width:300px;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:300;
}

.modal.active{
opacity:1;
pointer-events:all;
transform:translate(-50%,-50%) scale(1);
}

.modal input{
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:8px;
}

.modal button{
width:100%;
padding:10px;
background:#ff6a00;
border:none;
color:white;
cursor:pointer;
}

/* BUTTON */

.cta{
margin-top:20px;
padding:12px 30px;
background:#ff6a00;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="nav">
<div>Zaveli<span>kon</span></div>

<div class="burger" onclick="openMenu()">
<span></span>
<span></span>
<span></span>
</div>
</div>

<div class="menu" id="menu">
<div class="close" onclick="closeMenu()">✖</div>

<a href="#">Главная</a>
<a href="#">Программы</a>
<a href="#" onclick="openAuth()">Войти</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="hero">
<h1 id="welcome">Создай тело мечты</h1>
<button class="cta" onclick="openAuth()">Войти / Регистрация</button>
</div>

<!-- AUTH -->

<div class="modal" id="authModal">
<h3>Регистрация / Вход</h3>

<input type="text" id="login" placeholder="Логин">
<input type="password" id="password" placeholder="Пароль">

<button onclick="register()">Регистрация</button>
<button onclick="loginUser()">Войти</button>
</div>

<script>

/* MENU */

function openMenu(){
menu.classList.add("active");
overlay.classList.add("active");
}

function closeMenu(){
menu.classList.remove("active");
overlay.classList.remove("active");
}

/* AUTH */

function openAuth(){
authModal.classList.add("active");
overlay.classList.add("active");
}

function register(){
let login = document.getElementById("login").value;
let pass = document.getElementById("password").value;

localStorage.setItem("user", login);
localStorage.setItem("pass", pass);

alert("Зарегистрирован!");
}

function loginUser(){
let login = document.getElementById("login").value;
let pass = document.getElementById("password").value;

if(localStorage.getItem("user") === login && localStorage.getItem("pass") === pass){
document.getElementById("welcome").innerText = "Привет, " + login;
closeAuth();
}else{
alert("Ошибка");
}
}

function closeAuth(){
authModal.classList.remove("active");
overlay.classList.remove("active");
}

/* AUTO LOGIN */

window.onload = ()=>{
let user = localStorage.getItem("user");
if(user){
document.getElementById("welcome").innerText = "Привет, " + user;
}
}

</script>

</body>
</html>
