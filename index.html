<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zavelikon</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
body{background:#0b0b0b;color:white;overflow-x:hidden;}

.nav{display:flex;justify-content:space-between;padding:25px 8%;position:fixed;width:100%;top:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);z-index:100;}
.logo-nav{font-weight:800;font-size:24px;}
.logo-nav span{color:#ff6a00;}

.burger{width:30px;cursor:pointer;display:flex;flex-direction:column;gap:6px;}
.burger span{height:3px;background:white;border-radius:2px;}

.menu{position:fixed;top:0;right:-100%;width:300px;height:100vh;background:#111;display:flex;flex-direction:column;padding:100px 40px;gap:30px;transition:.4s;z-index:200;}
.menu a{color:white;text-decoration:none;font-size:20px;opacity:.7;}
.menu a:hover{opacity:1;color:#ff6a00;}
.menu.active{right:0;}

.hero{display:grid;grid-template-columns:1fr 1fr;height:100vh;}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:0 10%;}
.hero-left h1{font-size:70px;}
.hero-left h1 span{color:#ff6a00;}
.hero-left p{margin-top:20px;opacity:.7;}

.cta{margin-top:40px;padding:18px 50px;border:none;border-radius:10px;background:#ff6a00;color:white;cursor:pointer;}

.hero-right{background:url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b') center/cover no-repeat;}

.section{padding:120px 8%;}
.programs{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;}
.program{background:#141414;padding:40px;border-radius:20px;}
.price{font-size:40px;color:#ff6a00;}

.full-img{height:400px;background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48') center/cover no-repeat;margin-top:80px;border-radius:20px;}
.cta-block{margin-top:120px;padding:80px;background:#141414;border-radius:20px;text-align:center;}

.glow{position:fixed;width:300px;height:300px;background:radial-gradient(circle,#ff6a00aa 0%, transparent 60%);pointer-events:none;border-radius:50%;transform:translate(-50%,-50%);}

@media(max-width:900px){
.hero{grid-template-columns:1fr;}
.hero-right{height:300px;}
.hero-left h1{font-size:40px;}
}
</style>
</head>

<body>

<div class="nav">
<div class="logo-nav">Zaveli<span>kon</span></div>
<div class="burger" onclick="toggleMenu()">
<span></span><span></span><span></span>
</div>
</div>

<div class="menu" id="menu">
<a href="#">Главная</a>
<a href="#">Программы</a>
<a href="#">Контакты</a>
<a href="https://t.me/zhelko1" target="_blank">Написать</a>
<a href="https://t.me/zhelko1" target="_blank">Записаться</a>
</div>

<div class="hero">
<div class="hero-left">
<h1>Создай своё <span>идеальное тело</span></h1>
<p>Персональные тренировки, питание и контроль результата</p>

<button class="cta" onclick="window.open('https://t.me/zhelko1','_blank')">
Начать сейчас
</button>

</div>
<div class="hero-right"></div>
</div>

<div class="section">
<h1>Программы</h1>

<div class="programs">
<div class="program"><h3>Start</h3><div class="price">100$</div></div>
<div class="program"><h3>Pro</h3><div class="price">200$</div></div>
<div class="program"><h3>Ultra</h3><div class="price">500$</div></div>
</div>

<div class="full-img"></div>

<div class="cta-block">
<h2>Готов начать?</h2>
<button class="cta" onclick="window.open('https://t.me/zhelko1','_blank')">
Написать в Telegram
</button>
</div>
</div>

<div class="glow" id="glow"></div>

<script>
const menu = document.getElementById("menu");

function toggleMenu(){
menu.classList.toggle("active");
}

document.querySelectorAll("#menu a").forEach(link=>{
link.addEventListener("click", ()=>menu.classList.remove("active"));
});

document.addEventListener("click", (e)=>{
if(!menu.contains(e.target) && !e.target.closest(".burger")){
menu.classList.remove("active");
}
});

document.addEventListener("mousemove", e=>{
const glow = document.getElementById("glow");
glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
