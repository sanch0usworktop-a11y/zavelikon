<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:#0b0b0b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#141414;
padding:40px;
border-radius:20px;
width:340px;
text-align:center;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1e1e1e;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
cursor:pointer;
}

.switch{
margin-top:15px;
opacity:.7;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2 id="title">Регистрация</h2>

<input type="text" id="login" placeholder="Логин">
<input type="password" id="password" placeholder="Пароль">

<button onclick="submit()">Зарегистрироваться</button>

<div class="switch" onclick="toggle()">Уже есть аккаунт? Войти</div>

<div class="error" id="error"></div>
</div>

<script>

let loginMode = false;

function toggle(){
loginMode = !loginMode;

document.getElementById('title').innerText = loginMode ? 'Вход' : 'Регистрация';
document.querySelector('button').innerText = loginMode ? 'Войти' : 'Зарегистрироваться';
document.querySelector('.switch').innerText = loginMode ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти';
document.getElementById('error').innerText = '';
}

function submit(){
let login = document.getElementById('login').value;
let password = document.getElementById('password').value;
let error = document.getElementById('error');

if(!login || !password){
error.innerText = 'Заполни все поля';
return;
}

let users = JSON.parse(localStorage.getItem('users')) || [];

if(loginMode){
// вход
let user = users.find(u => u.login === login);

if(!user){
error.innerText = 'Неверный логин';
return;
}

if(user.password !== password){
error.innerText = 'Неверный пароль';
return;
}

localStorage.setItem('currentUser', login);
window.location.href = 'index.html';

}else{
// регистрация
let exists = users.find(u => u.login === login);

if(exists){
error.innerText = 'Пользователь уже существует';
return;
}

users.push({login, password});
localStorage.setItem('users', JSON.stringify(users));
localStorage.setItem('currentUser', login);

window.location.href = 'index.html';
}

}

</script>

</body>
</html>
